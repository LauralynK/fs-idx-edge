name = "fs-idx-edge"
main = "worker.js"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "95d21fb829ce4edfbd0a68484e3240fd"

[vars]
R2_PUBLIC_URL = "https://media.foursailsrealestate.com"

# Saved-search email alerts: instant searches checked every run;
# daily ~9 AM ET, weekly Monday, monthly 1st (gating logic in worker).
[triggers]
crons = ["*/15 * * * *"]

# Account Secrets Store bindings — resolved to strings in worker via resolveSecrets()
[[secrets_store_secrets]]
binding = "MAILGUN_API_KEY"
store_id = "0f8750685fed4c7a8f5c9c2e67ee3861"
secret_name = "MAILGUN_API_KEY"

[[secrets_store_secrets]]
binding = "TELEGRAM_BOT_TOKEN"
store_id = "0f8750685fed4c7a8f5c9c2e67ee3861"
secret_name = "TELEGRAM_BOT_TOKEN"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
